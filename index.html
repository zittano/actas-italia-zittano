<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zittano — Sistema de Actas Italia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
/* [MISMO CSS QUE ANTES - LO MANTENGO IGUAL] */
:root{--az:#003399;--az2:#0044cc;--azl:#e8efff;--vd:#009246;--vdl:#e6f7ee;--ro:#CE2B37;--rol:#fdecea;--am:#f59e0b;--aml:#fef9c3;--gr:#64748b;--grd:#1e293b;--grl:#f1f5f9;--bg:#f8fafc;--wh:#fff;--bo:#e2e8f0;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--grd);min-height:100vh;-webkit-font-smoothing:antialiased;}
input,select,textarea,button{font-family:"DM Sans",sans-serif;}
textarea{resize:vertical;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bo);border-radius:4px;}
.hdr{background:var(--wh);border-bottom:1px solid var(--bo);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--bo);}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 24px;gap:16px;}
.hlogo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-banderas{display:flex;gap:4px;height:36px;}
.bandera-italia, .bandera-ue{width:24px;height:36px;border-radius:3px;overflow:hidden;flex-shrink:0;}
.bandera-italia{background:linear-gradient(to right, #009246 33.33%, white 33.33%, white 66.66%, #ce2b37 66.66%);}
.bandera-ue{background:#003399;position:relative;}
.estrella-ue{color:#FFCC00;font-size:6px;position:absolute;line-height:1;}
.estrella-ue:nth-child(1){top:4px;left:50%;transform:translateX(-50%);}
.estrella-ue:nth-child(2){top:10px;right:4px;}
.estrella-ue:nth-child(3){bottom:10px;right:4px;}
.estrella-ue:nth-child(4){bottom:4px;left:50%;transform:translateX(-50%);}
.estrella-ue:nth-child(5){bottom:10px;left:4px;}
.estrella-ue:nth-child(6){top:10px;left:4px;}
.hbrand{font-family:"DM Serif Display",serif;font-size:20px;color:var(--grd);letter-spacing:1px;}
.hsub{font-size:9px;font-weight:500;letter-spacing:2px;color:#bbb;text-transform:uppercase;}
.htabs{display:flex;gap:2px;background:var(--grl);padding:3px;border-radius:9px;}
.htab{padding:6px 18px;border-radius:7px;border:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--gr);cursor:pointer;transition:all .13s;white-space:nowrap;}
.htab:hover{color:var(--grd);}
.htab.on{background:var(--wh);color:var(--grd);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.hrgt{display:flex;align-items:center;gap:10px;}
.gchip{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.gdot{width:8px;height:8px;border-radius:50%;}
.view{display:none;}
.view.on{display:block;}
.vbody{max-width:1400px;margin:0 auto;padding:24px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.search-box{display:flex;gap:10px;flex:1;max-width:500px;}
.search-box input{flex:1;padding:10px 14px;border:1.5px solid var(--bo);border-radius:9px;font-size:13px;color:var(--grd);background:var(--wh);outline:none;transition:border .13s;}
.search-box input:focus{border-color:var(--az);}
.btn-add{padding:10px 18px;background:linear-gradient(135deg,var(--vd),#00a854);color:var(--wh);border:none;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,146,70,.2);}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,146,70,.3);}
.table-wrap{background:var(--wh);border-radius:12px;box-shadow:var(--sh);border:1px solid var(--bo);overflow:hidden;}
.actas-table{width:100%;border-collapse:collapse;}
.actas-table thead{background:var(--grl);}
.actas-table th{padding:12px 16px;font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bo);}
.actas-table td{padding:12px 16px;border-bottom:1px solid var(--grl);font-size:13px;color:var(--grd);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.actas-table tbody tr{transition:background .13s;}
.actas-table tbody tr:hover{background:var(--azl);}
.tipo-badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.tipo-nacimiento{background:var(--vdl);color:#065f46;}
.tipo-matrimonio{background:#fce7f3;color:#831843;}
.tipo-defuncion{background:#fef3c7;color:#78350f;}
.tipo-bautismo{background:#dbeafe;color:#1e40af;}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn-edit,.btn-del,.btn-finalizar,.btn-proceso{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;background:transparent;font-size:12px;font-weight:500;color:var(--gr);cursor:pointer;transition:all .13s;}
.btn-edit:hover{border-color:var(--az);color:var(--az);background:var(--azl);}
.btn-del:hover{border-color:var(--ro);color:var(--ro);background:var(--rol);}
.btn-finalizar{border-color:var(--vd);background:var(--vdl);color:var(--vd);font-weight:600;}
.btn-finalizar:hover{background:var(--vd);color:var(--wh);transform:translateY(-1px);}
.btn-proceso{border-color:var(--am);background:var(--aml);color:var(--am);font-weight:600;}
.btn-proceso:hover{background:var(--am);color:var(--wh);transform:translateY(-1px);}
.imperio-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef3c7;color:#78350f;border:1.5px solid #fcd34d;margin-left:6px;vertical-align:middle;}
.imperio-badge::before{content:"⚠️";font-size:11px;}
.imperio-info{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:#78350f;display:none;}
.imperio-info.show{display:block;}
.imperio-info strong{font-weight:700;}
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.modal.on{display:flex;}
.modal-content{background:var(--wh);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:700px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .2s;}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:700;color:var(--grd);}
.modal-close{width:32px;height:32px;border:none;background:var(--grl);border-radius:8px;cursor:pointer;font-size:18px;color:var(--gr);transition:all .13s;}
.modal-close:hover{background:var(--rol);color:var(--ro);}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase;}
.form-field input,.form-field select,.form-field textarea{padding:10px 13px;border:1.5px solid var(--bo);border-radius:9px;font-size:13px;color:var(--grd);background:#fafcff;outline:none;transition:border .13s;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--az);}
.form-field textarea{min-height:80px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--bo);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:10px 20px;border:1px solid var(--bo);border-radius:8px;background:transparent;font-size:13px;font-weight:500;color:var(--gr);cursor:pointer;transition:all .13s;}
.btn-cancel:hover{background:var(--grl);}
.btn-save{padding:10px 20px;background:linear-gradient(135deg,var(--az),var(--az2));color:var(--wh);border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,51,153,.2);}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,51,153,.3);}
.empty-state{text-align:center;padding:60px 20px;color:var(--gr);}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.empty-state-text{font-size:15px;font-weight:500;}
.loading{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);align-items:center;justify-content:center;}
.loading.on{display:flex;}
.loading-spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;padding:16px;}
.page-btn{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;background:var(--wh);font-size:12px;font-weight:500;color:var(--gr);cursor:pointer;transition:all .13s;}
.page-btn:hover{border-color:var(--az);color:var(--az);background:var(--azl);}
.page-btn.active{border-color:var(--az);background:var(--az);color:var(--wh);}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--gr);font-weight:500;}
.config-banner{background:#fef3c7;border-bottom:2px solid #fcd34d;padding:12px 24px;text-align:center;font-size:13px;color:#78350f;font-weight:600;}
.config-banner a{color:var(--az);text-decoration:underline;font-weight:700;}
@media(max-width:768px){.form-grid{grid-template-columns:1fr;}.toolbar{flex-direction:column;align-items:stretch;}.search-box{max-width:100%;}.actas-table{font-size:12px;}.actas-table th,.actas-table td{padding:8px 10px;}.btn-actions{flex-direction:column;}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
</div>

<header class="hdr">
  <div class="hdr-in">
    <div class="hlogo">
      <div class="logo-banderas">
        <div class="bandera-italia"></div>
        <div class="bandera-ue">
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
        </div>
      </div>
      <div>
        <div class="hbrand">Z I T T A N O</div>
        <div class="hsub">ACTAS ITALIA</div>
      </div>
    </div>
    <div class="htabs">
      <button class="htab on" onclick="cambiarVista('proceso')" data-tab="proceso">En Proceso</button>
      <button class="htab" onclick="cambiarVista('finalizados')" data-tab="finalizados">Finalizados</button>
    </div>
    <div class="hrgt">
      <div class="gchip" id="contador">
        <div class="gdot" style="background:var(--am)"></div>
        <span id="total-count">0</span>
      </div>
    </div>
  </div>
</header>

<div class="view on" id="view-proceso">
  <div class="vbody">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" placeholder="Buscar..." id="search-proceso" onkeyup="filtrarTabla('proceso')">
      </div>
      <button class="btn-add" onclick="abrirModal('proceso')">+ Nueva Acta</button>
    </div>
    <div class="table-wrap">
      <table class="actas-table">
        <thead>
          <tr>
            <th style="width:90px">Fecha</th>
            <th>Persona</th>
            <th>AVO</th>
            <th style="width:100px">Tipo</th>
            <th>Comuna</th>
            <th>Notas</th>
            <th style="width:220px">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-proceso"></tbody>
      </table>
      <div class="pagination" id="pag-proceso"></div>
    </div>
  </div>
</div>

<div class="view" id="view-finalizados">
  <div class="vbody">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" placeholder="Buscar..." id="search-finalizados" onkeyup="filtrarTabla('finalizados')">
      </div>
      <button class="btn-add" onclick="abrirModal('finalizados')">+ Nueva Acta</button>
    </div>
    <div class="table-wrap">
      <table class="actas-table">
        <thead>
          <tr>
            <th style="width:90px">Fecha</th>
            <th>Persona</th>
            <th>AVO</th>
            <th style="width:100px">Tipo</th>
            <th>Comuna</th>
            <th>Notas</th>
            <th style="width:220px">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-finalizados"></tbody>
      </table>
      <div class="pagination" id="pag-finalizados"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nueva Acta</h2>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <form class="form-grid" id="form-acta">
        <div class="form-field">
          <label>Fecha de Pedido</label>
          <input type="date" id="input-fecha" required>
        </div>
        <div class="form-field">
          <label>Estado</label>
          <select id="input-estado" required>
            <option value="proceso">En Proceso</option>
            <option value="finalizados">Finalizados</option>
          </select>
        </div>
        <div class="form-field full">
          <label>Persona / Cliente</label>
          <input type="text" id="input-persona" placeholder="Ej: ANDRADA GISELA JEZABEL" required>
        </div>
        <div class="form-field full">
          <label>AVO (Antepasado Italiano)</label>
          <input type="text" id="input-avo" placeholder="Ej: NAZER PEDRO AGUSTIN">
        </div>
        <div class="form-field">
          <label>Tipo de Acta</label>
          <select id="input-tipo" required>
            <option value="Nacimiento">Nacimiento</option>
            <option value="Matrimonio">Matrimonio</option>
            <option value="Defunción">Defunción</option>
            <option value="Bautismo">Bautismo</option>
          </select>
        </div>
        <div class="form-field">
          <label>Comuna</label>
          <input type="text" id="input-comuna" placeholder="Ej: CANCELLARA" required onkeyup="checkImperio()">
        </div>
        <div class="form-field full">
          <div class="imperio-info" id="imperio-info">
            <strong>⚠️ Comuna del Imperio Austro-Húngaro</strong><br>
            Si el ascendiente nació aquí y emigró entre 25/12/1867 y 16/07/1920, el reconocimiento <strong>NO SE PUEDE DAR</strong>.
          </div>
        </div>
        <div class="form-field full">
          <label>Notas / Observaciones</label>
          <textarea id="input-notas" placeholder="Detalles adicionales..."></textarea>
        </div>
        <input type="hidden" id="input-id">
        <input type="hidden" id="input-estado-original">
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarActa()">Guardar</button>
    </div>
  </div>
</div>

const ITEMS_POR_PAGINA = 50;

let actas = {proceso: [], finalizados: []};

let paginaActual = {proceso: 1, finalizados: 1};
let vistaActual = 'proceso';
let editandoId = null;

function esDelImperio(comuna) {
  if (!comuna) return false;
  const comunaNorm = comuna.toUpperCase().trim();
  return COMUNAS_IMPERIO.some(ci => {
    const ciNorm = ci.toUpperCase();
    return ciNorm.includes(comunaNorm) || comunaNorm.includes(ciNorm.split('[')[0].trim());
  });
}

function badgeImperio() {
  return '<span class="imperio-badge">IMPERIO A-H</span>';
}

function checkImperio() {
  const comuna = document.getElementById('input-comuna').value;
  const infoDiv = document.getElementById('imperio-info');
  if (esDelImperio(comuna)) {
    infoDiv.classList.add('show');
  } else {
    infoDiv.classList.remove('show');
  }
}

function showLoading(show = true) {
  document.getElementById('loading').classList.toggle('on', show);
}

async function cargarActas() {
  showLoading();
  try {
    const { data, error } = await supabase
      .from('actas_italia')
      .select('*')
      .order('fecha', { ascending: false });
    
    if (error) throw error;
    
    actas.proceso = data.filter(a => a.estado === 'proceso');
    actas.finalizados = data.filter(a => a.estado === 'finalizados');
    
    datosFiltrados.proceso = [...actas.proceso];
    datosFiltrados.finalizados = [...actas.finalizados];
    
    renderizarTablas();
    actualizarContador();
  } catch (error) {
    console.error('Error cargando actas:', error);
    alert('Error al cargar las actas. Verificá tu conexión a Supabase.');
  } finally {
    showLoading(false);
  }
}

async function guardarActa() {
  const fecha = document.getElementById('input-fecha').value;
  const estado = document.getElementById('input-estado').value;
  const persona = document.getElementById('input-persona').value;
  const avo = document.getElementById('input-avo').value;
  const tipo = document.getElementById('input-tipo').value;
  const comuna = document.getElementById('input-comuna').value;
  const notas = document.getElementById('input-notas').value;
  
  if (!fecha || !persona || !tipo || !comuna) {
    alert('Completá los campos obligatorios');
    return;
  }
  
  showLoading();
  try {
    const acta = { fecha, estado, persona, avo, tipo, comuna, notas };
    
    if (editandoId) {
      const { error } = await supabase
        .from('actas_italia')
        .update(acta)
        .eq('id', editandoId);
      if (error) throw error;
    } else {
      const { error } = await supabase
        .from('actas_italia')
        .insert([acta]);
      if (error) throw error;
    }
    
    await cargarActas();
    cerrarModal();
  } catch (error) {
    console.error('Error guardando:', error);
    alert('Error al guardar la acta');
  } finally {
    showLoading(false);
  }
}

async function cambiarEstado(tipo, index, nuevoEstado) {
  const acta = datosFiltrados[tipo][index];
  const texto = nuevoEstado === 'finalizados' ? 'FINALIZADA' : 'EN PROCESO';
  if (!confirm(`¿Marcar como ${texto} la acta de ${acta.persona}?`)) return;
  
  showLoading();
  try {
    const { error } = await supabase
      .from('actas_italia')
      .update({ estado: nuevoEstado })
      .eq('id', acta.id);
    
    if (error) throw error;
    await cargarActas();
  } catch (error) {
    console.error('Error:', error);
    alert('Error al cambiar estado');
  } finally {
    showLoading(false);
  }
}

async function eliminarActa(tipo, index) {
  const acta = datosFiltrados[tipo][index];
  if (!confirm(`¿Eliminar la acta de ${acta.persona}?`)) return;
  
  showLoading();
  try {
    const { error } = await supabase
      .from('actas_italia')
      .delete()
      .eq('id', acta.id);
    
    if (error) throw error;
    await cargarActas();
  } catch (error) {
    console.error('Error:', error);
    alert('Error al eliminar');
  } finally {
    showLoading(false);
  }
}

function editarActa(tipo, index) {
  const acta = datosFiltrados[tipo][index];
  editandoId = acta.id;
  document.getElementById('input-fecha').value = acta.fecha;
  document.getElementById('input-estado').value = acta.estado;
  document.getElementById('input-persona').value = acta.persona;
  document.getElementById('input-avo').value = acta.avo || '';
  document.getElementById('input-tipo').value = acta.tipo;
  document.getElementById('input-comuna').value = acta.comuna;
  document.getElementById('input-notas').value = acta.notas || '';
  document.getElementById('input-estado-original').value = acta.estado;
  document.getElementById('modal-title').textContent = 'Editar Acta';
  document.getElementById('modal').classList.add('on');
  checkImperio();
}

function cambiarVista(vista) {
  vistaActual = vista;
  paginaActual[vista] = 1;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.htab').forEach(t => t.classList.remove('on'));
  document.getElementById('view-' + vista).classList.add('on');
  document.querySelector(`[data-tab="${vista}"]`).classList.add('on');
  renderizarTabla(vista);
  actualizarContador();
}

function actualizarContador() {
  document.getElementById('total-count').textContent = datosFiltrados[vistaActual].length;
}

function renderizarTablas() {
  renderizarTabla('proceso');
  renderizarTabla('finalizados');
}

function renderizarTabla(tipo) {
  const tbody = document.getElementById('tabla-' + tipo);
  const datos = datosFiltrados[tipo];
  const pagina = paginaActual[tipo];
  
  if (datos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">No hay actas</div></div></td></tr>';
    document.getElementById('pag-' + tipo).innerHTML = '';
    return;
  }
  
  const inicio = (pagina - 1) * ITEMS_POR_PAGINA;
  const fin = inicio + ITEMS_POR_PAGINA;
  const datosPagina = datos.slice(inicio, fin);
  
  tbody.innerHTML = datosPagina.map((acta, i) => {
    const indexReal = inicio + i;
    const tipoBadge = 'tipo-' + acta.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    return `<tr>
      <td>${formatearFecha(acta.fecha)}</td>
      <td title="${acta.persona}"><strong>${acta.persona}</strong></td>
      <td title="${acta.avo}">${acta.avo || '-'}</td>
      <td><span class="tipo-badge ${tipoBadge}">${acta.tipo}</span></td>
      <td title="${acta.comuna}" style="color:var(--az);font-weight:600">${acta.comuna}${esDelImperio(acta.comuna) ? badgeImperio() : ''}</td>
      <td title="${acta.notas}" style="font-size:12px;color:var(--gr)">${acta.notas ? acta.notas.substring(0, 40) + '...' : '-'}</td>
      <td><div class="btn-actions">
        ${tipo === 'proceso' ? `<button class="btn-finalizar" onclick="cambiarEstado('${tipo}', ${indexReal}, 'finalizados')">✓ Finalizar</button>` : ''}
        ${tipo === 'finalizados' ? `<button class="btn-proceso" onclick="cambiarEstado('${tipo}', ${indexReal}, 'proceso')">← En Proceso</button>` : ''}
        <button class="btn-edit" onclick="editarActa('${tipo}', ${indexReal})">Editar</button>
        <button class="btn-del" onclick="eliminarActa('${tipo}', ${indexReal})">Eliminar</button>
      </div></td>
    </tr>`;
  }).join('');
  
  renderizarPaginacion(tipo);
}

function renderizarPaginacion(tipo) {
  const datos = datosFiltrados[tipo];
  const totalPag = Math.ceil(datos.length / ITEMS_POR_PAGINA);
  const pag = document.getElementById('pag-' + tipo);
  if (totalPag <= 1) { pag.innerHTML = ''; return; }
  const actual = paginaActual[tipo];
  let html = `<button class="page-btn" onclick="irAPagina('${tipo}', ${actual - 1})" ${actual === 1 ? 'disabled' : ''}>‹</button>`;
  for (let i = 1; i <= totalPag; i++) {
    if (i === 1 || i === totalPag || (i >= actual - 2 && i <= actual + 2)) {
      html += `<button class="page-btn ${i === actual ? 'active' : ''}" onclick="irAPagina('${tipo}', ${i})">${i}</button>`;
    } else if (i === actual - 3 || i === actual + 3) {
      html += '<span class="page-info">...</span>';
    }
  }
  html += `<button class="page-btn" onclick="irAPagina('${tipo}', ${actual + 1})" ${actual === totalPag ? 'disabled' : ''}>›</button>`;
  pag.innerHTML = html;
}

function irAPagina(tipo, pagina) {
  const total = Math.ceil(datosFiltrados[tipo].length / ITEMS_POR_PAGINA);
  if (pagina < 1 || pagina > total) return;
  paginaActual[tipo] = pagina;
  renderizarTabla(tipo);
}

function formatearFecha(fecha) {
  if (!fecha) return '-';
  const d = new Date(fecha + 'T00:00:00');
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function abrirModal(estado = null) {
  editandoId = null;
  document.getElementById('form-acta').reset();
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('input-fecha').value = hoy;
  document.getElementById('input-estado').value = estado || vistaActual;
  document.getElementById('modal-title').textContent = 'Nueva Acta';
  document.getElementById('modal').classList.add('on');
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('on');
  editandoId = null;
}

function filtrarTabla(tipo) {
  const filtro = document.getElementById('search-' + tipo).value.toLowerCase();
  if (!filtro) {
    datosFiltrados[tipo] = [...actas[tipo]];
  } else {
    datosFiltrados[tipo] = actas[tipo].filter(a => {
      const texto = `${a.persona} ${a.avo} ${a.comuna} ${a.tipo} ${a.notas}`.toLowerCase();
      return texto.includes(filtro);
    });
  }
  paginaActual[tipo] = 1;
  renderizarTabla(tipo);
  actualizarContador();
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});

// INICIAR
cargarActas();
document.getElementById('input-fecha').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
