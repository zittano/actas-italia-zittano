<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zittano — Sistema de Actas Italia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
:root{--az:#003399;--az2:#0044cc;--azl:#e8efff;--vd:#009246;--vdl:#e6f7ee;--ro:#CE2B37;--rol:#fdecea;--am:#f59e0b;--aml:#fef9c3;--gr:#64748b;--grd:#1e293b;--grl:#f1f5f9;--bg:#f8fafc;--wh:#fff;--bo:#e2e8f0;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--grd);min-height:100vh;}
input,select,textarea,button{font-family:"DM Sans",sans-serif;}
.hdr{background:var(--wh);border-bottom:1px solid var(--bo);position:sticky;top:0;z-index:100;}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 24px;gap:16px;}
.hlogo{display:flex;align-items:center;gap:10px;}
.logo-banderas{display:flex;gap:4px;height:36px;}
.bandera-italia,.bandera-ue{width:24px;height:36px;border-radius:3px;}
.bandera-italia{background:linear-gradient(to right,#009246 33.33%,white 33.33%,white 66.66%,#ce2b37 66.66%);}
.bandera-ue{background:#003399;position:relative;}
.estrella-ue{color:#FFCC00;font-size:6px;position:absolute;line-height:1;}
.estrella-ue:nth-child(1){top:4px;left:50%;transform:translateX(-50%);}
.estrella-ue:nth-child(2){top:10px;right:4px;}
.estrella-ue:nth-child(3){bottom:10px;right:4px;}
.estrella-ue:nth-child(4){bottom:4px;left:50%;transform:translateX(-50%);}
.estrella-ue:nth-child(5){bottom:10px;left:4px;}
.estrella-ue:nth-child(6){top:10px;left:4px;}
.hbrand{font-family:"DM Serif Display",serif;font-size:20px;color:var(--grd);letter-spacing:1px;}
.hsub{font-size:9px;font-weight:500;letter-spacing:2px;color:#bbb;text-transform:uppercase;}
.htabs{display:flex;gap:2px;background:var(--grl);padding:3px;border-radius:9px;}
.htab{padding:6px 18px;border-radius:7px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--gr);cursor:pointer;transition:all .13s;}
.htab:hover{color:var(--grd);}
.htab.on{background:var(--wh);color:var(--grd);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.hrgt{display:flex;align-items:center;gap:10px;}
.gchip{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.gdot{width:8px;height:8px;border-radius:50%;}
.view{display:none;}
.view.on{display:block;}
.vbody{max-width:1400px;margin:0 auto;padding:24px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.search-box{display:flex;gap:10px;flex:1;max-width:500px;}
.search-box input{flex:1;padding:10px 14px;border:1.5px solid var(--bo);border-radius:9px;font-size:13px;background:var(--wh);outline:none;}
.search-box input:focus{border-color:var(--az);}
.btn-add{padding:10px 18px;background:linear-gradient(135deg,var(--vd),#00a854);color:var(--wh);border:none;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;}
.table-wrap{background:var(--wh);border-radius:12px;box-shadow:var(--sh);border:1px solid var(--bo);overflow:hidden;}
.actas-table{width:100%;border-collapse:collapse;}
.actas-table thead{background:var(--grl);}
.actas-table th{padding:12px 16px;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bo);}
.actas-table td{padding:12px 16px;border-bottom:1px solid var(--grl);font-size:13px;color:var(--grd);}
.actas-table tbody tr:hover{background:var(--azl);}
.tipo-badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.tipo-nacimiento{background:var(--vdl);color:#065f46;}
.tipo-matrimonio{background:#fce7f3;color:#831843;}
.tipo-defuncion{background:#fef3c7;color:#78350f;}
.tipo-bautismo{background:#dbeafe;color:#1e40af;}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn-edit,.btn-del,.btn-finalizar,.btn-proceso{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s;}
.btn-edit{background:transparent;color:var(--gr);}
.btn-edit:hover{border-color:var(--az);color:var(--az);background:var(--azl);}
.btn-del{background:transparent;color:var(--gr);}
.btn-del:hover{border-color:var(--ro);color:var(--ro);background:var(--rol);}
.btn-finalizar{border-color:var(--vd);background:var(--vdl);color:var(--vd);font-weight:600;}
.btn-finalizar:hover{background:var(--vd);color:var(--wh);}
.btn-proceso{border-color:var(--am);background:var(--aml);color:var(--am);font-weight:600;}
.btn-proceso:hover{background:var(--am);color:var(--wh);}
.imperio-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef3c7;color:#78350f;border:1.5px solid #fcd34d;margin-left:6px;}
.imperio-badge::before{content:"⚠️";font-size:11px;}
.imperio-info{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:#78350f;display:none;}
.imperio-info.show{display:block;}
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);align-items:center;justify-content:center;padding:20px;}
.modal.on{display:flex;}
.modal-content{background:var(--wh);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border:none;background:var(--grl);border-radius:8px;cursor:pointer;font-size:18px;}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;}
.form-field input,.form-field select,.form-field textarea{padding:10px 13px;border:1.5px solid var(--bo);border-radius:9px;font-size:13px;outline:none;}
.form-field textarea{min-height:80px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--bo);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:10px 20px;border:1px solid var(--bo);border-radius:8px;background:transparent;font-size:13px;font-weight:500;cursor:pointer;}
.btn-save{padding:10px 20px;background:linear-gradient(135deg,var(--az),var(--az2));color:var(--wh);border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;}
.empty-state{text-align:center;padding:60px 20px;color:var(--gr);}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:20px;padding:16px;}
.page-btn{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;background:var(--wh);font-size:12px;cursor:pointer;}
.page-btn.active{background:var(--az);color:var(--wh);}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="hlogo">
      <div class="logo-banderas">
        <div class="bandera-italia"></div>
        <div class="bandera-ue">
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
          <span class="estrella-ue">★</span>
        </div>
      </div>
      <div>
        <div class="hbrand">Z I T T A N O</div>
        <div class="hsub">ACTAS ITALIA</div>
      </div>
    </div>
    <div class="htabs">
      <button class="htab on" onclick="cambiarVista('proceso')" data-tab="proceso">En Proceso</button>
      <button class="htab" onclick="cambiarVista('finalizados')" data-tab="finalizados">Finalizados</button>
    </div>
    <div class="hrgt">
      <div class="gchip" id="contador">
        <div class="gdot" style="background:var(--am)"></div>
        <span id="total-count">0</span>
      </div>
    </div>
  </div>
</header>

<div class="view on" id="view-proceso">
  <div class="vbody">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" placeholder="Buscar..." id="search-proceso" onkeyup="filtrar('proceso')">
      </div>
      <button class="btn-add" onclick="abrirModal('proceso')">+ Nueva Acta</button>
    </div>
    <div class="table-wrap">
      <table class="actas-table">
        <thead>
          <tr>
            <th style="width:90px">Fecha</th>
            <th>Persona</th>
            <th>AVO</th>
            <th style="width:100px">Tipo</th>
            <th>Comuna</th>
            <th>Notas</th>
            <th style="width:240px">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-proceso"></tbody>
      </table>
      <div class="pagination" id="pag-proceso"></div>
    </div>
  </div>
</div>

<div class="view" id="view-finalizados">
  <div class="vbody">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" placeholder="Buscar..." id="search-finalizados" onkeyup="filtrar('finalizados')">
      </div>
      <button class="btn-add" onclick="abrirModal('finalizados')">+ Nueva Acta</button>
    </div>
    <div class="table-wrap">
      <table class="actas-table">
        <thead>
          <tr>
            <th style="width:90px">Fecha</th>
            <th>Persona</th>
            <th>AVO</th>
            <th style="width:100px">Tipo</th>
            <th>Comuna</th>
            <th>Notas</th>
            <th style="width:240px">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-finalizados"></tbody>
      </table>
      <div class="pagination" id="pag-finalizados"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nueva Acta</h2>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <form class="form-grid" id="form-acta" onsubmit="event.preventDefault()">
        <div class="form-field">
          <label>Fecha</label>
          <input type="date" id="i-fecha" required>
        </div>
        <div class="form-field">
          <label>Estado</label>
          <select id="i-estado" required>
            <option value="proceso">En Proceso</option>
            <option value="finalizados">Finalizados</option>
          </select>
        </div>
        <div class="form-field full">
          <label>Persona</label>
          <input type="text" id="i-persona" required>
        </div>
        <div class="form-field full">
          <label>AVO</label>
          <input type="text" id="i-avo">
        </div>
        <div class="form-field">
          <label>Tipo</label>
          <select id="i-tipo" required>
            <option value="Nacimiento">Nacimiento</option>
            <option value="Matrimonio">Matrimonio</option>
            <option value="Defunción">Defunción</option>
            <option value="Bautismo">Bautismo</option>
          </select>
        </div>
        <div class="form-field">
          <label>Comuna</label>
          <input type="text" id="i-comuna" required onkeyup="checkImperio()">
        </div>
        <div class="form-field full">
          <div class="imperio-info" id="imperio-info">
            <strong>⚠️ Comuna del Imperio Austro-Húngaro</strong><br>
            Si emigró entre 25/12/1867 y 16/07/1920 → NO se puede dar ciudadanía.
          </div>
        </div>
        <div class="form-field full">
          <label>Notas</label>
          <textarea id="i-notas"></textarea>
        </div>
        <input type="hidden" id="i-id">
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

const POR_PAG = 50;

let actas = {proceso: [], finalizados: []};
let filtradas = {proceso: [], finalizados: []};
let pag = {proceso: 1, finalizados: 1};
let vista = 'proceso';
let editId = null;

function esImperio(c) {
  if (!c) return false;
  const cn = c.toUpperCase().trim();
  return COMUNAS.some(ci => ci.toUpperCase().includes(cn) || cn.includes(ci.toUpperCase().split('[')[0].trim()));
}

function badgeImperio() {
  return '<span class="imperio-badge">IMPERIO A-H</span>';
}

function checkImperio() {
  const c = document.getElementById('i-comuna').value;
  document.getElementById('imperio-info').classList.toggle('show', esImperio(c));
}

async function cargar() {
  try {
    const {data, error} = await sb.from('actas_italia').select('*').order('fecha', {ascending: false});
    if (error) throw error;
    actas.proceso = data.filter(a => a.estado === 'proceso');
    actas.finalizados = data.filter(a => a.estado === 'finalizados');
    filtradas.proceso = [...actas.proceso];
    filtradas.finalizados = [...actas.finalizados];
    render();
  } catch (e) {
    console.error(e);
    alert('Error al cargar datos');
  }
}

function cambiarVista(v) {
  vista = v;
  pag[v] = 1;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.htab').forEach(el => el.classList.remove('on'));
  document.getElementById('view-' + v).classList.add('on');
  document.querySelector(`[data-tab="${v}"]`).classList.add('on');
  renderTabla(v);
  document.getElementById('total-count').textContent = filtradas[v].length;
}

function render() {
  renderTabla('proceso');
  renderTabla('finalizados');
  document.getElementById('total-count').textContent = filtradas[vista].length;
}

function renderTabla(t) {
  const tbody = document.getElementById('tabla-' + t);
  const datos = filtradas[t];
  const p = pag[t];
  
  if (datos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">📋<br>No hay actas</div></td></tr>';
    document.getElementById('pag-' + t).innerHTML = '';
    return;
  }
  
  const ini = (p - 1) * POR_PAG;
  const fin = ini + POR_PAG;
  const pagDatos = datos.slice(ini, fin);
  
  tbody.innerHTML = pagDatos.map((a, i) => {
    const idx = ini + i;
    const tb = 'tipo-' + a.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    return `<tr>
      <td>${fmt(a.fecha)}</td>
      <td><strong>${a.persona}</strong></td>
      <td>${a.avo || '-'}</td>
      <td><span class="tipo-badge ${tb}">${a.tipo}</span></td>
      <td style="color:var(--az);font-weight:600">${a.comuna}${esImperio(a.comuna) ? badgeImperio() : ''}</td>
      <td style="font-size:12px;color:var(--gr)">${(a.notas || '').substring(0, 40) + (a.notas?.length > 40 ? '...' : '')}</td>
      <td><div class="btn-actions">
        ${t === 'proceso' ? `<button class="btn-finalizar" onclick="mover('${t}', ${idx}, 'finalizados')">✓ Finalizar</button>` : ''}
        ${t === 'finalizados' ? `<button class="btn-proceso" onclick="mover('${t}', ${idx}, 'proceso')">← En Proceso</button>` : ''}
        <button class="btn-edit" onclick="editar('${t}', ${idx})">Editar</button>
        <button class="btn-del" onclick="eliminar('${t}', ${idx})">Eliminar</button>
      </div></td>
    </tr>`;
  }).join('');
  
  renderPag(t);
}

function renderPag(t) {
  const total = Math.ceil(filtradas[t].length / POR_PAG);
  const div = document.getElementById('pag-' + t);
  if (total <= 1) {
    div.innerHTML = '';
    return;
  }
  const p = pag[t];
  let html = `<button class="page-btn" onclick="irPag('${t}', ${p - 1})" ${p === 1 ? 'disabled' : ''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= p - 2 && i <= p + 2)) {
      html += `<button class="page-btn ${i === p ? 'active' : ''}" onclick="irPag('${t}', ${i})">${i}</button>`;
    }
  }
  html += `<button class="page-btn" onclick="irPag('${t}', ${p + 1})" ${p === total ? 'disabled' : ''}>›</button>`;
  div.innerHTML = html;
}

function irPag(t, p) {
  const total = Math.ceil(filtradas[t].length / POR_PAG);
  if (p < 1 || p > total) return;
  pag[t] = p;
  renderTabla(t);
}

function fmt(f) {
  if (!f) return '-';
  const d = new Date(f + 'T00:00:00');
  return d.toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'});
}

function abrirModal(est) {
  editId = null;
  document.getElementById('form-acta').reset();
  document.getElementById('i-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('i-estado').value = est;
  document.getElementById('modal-title').textContent = 'Nueva Acta';
  document.getElementById('modal').classList.add('on');
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('on');
  editId = null;
}

async function guardar() {
  const fecha = document.getElementById('i-fecha').value;
  const estado = document.getElementById('i-estado').value;
  const persona = document.getElementById('i-persona').value;
  const avo = document.getElementById('i-avo').value;
  const tipo = document.getElementById('i-tipo').value;
  const comuna = document.getElementById('i-comuna').value;
  const notas = document.getElementById('i-notas').value;
  
  if (!fecha || !persona || !tipo || !comuna) {
    alert('Completá los campos obligatorios');
    return;
  }
  
  try {
    const acta = {fecha, estado, persona, avo, tipo, comuna, notas};
    if (editId) {
      const {error} = await sb.from('actas_italia').update(acta).eq('id', editId);
      if (error) throw error;
    } else {
      const {error} = await sb.from('actas_italia').insert([acta]);
      if (error) throw error;
    }
    await cargar();
    cerrarModal();
  } catch (e) {
    console.error(e);
    alert('Error al guardar');
  }
}

function editar(t, idx) {
  const a = filtradas[t][idx];
  editId = a.id;
  document.getElementById('i-fecha').value = a.fecha;
  document.getElementById('i-estado').value = a.estado;
  document.getElementById('i-persona').value = a.persona;
  document.getElementById('i-avo').value = a.avo || '';
  document.getElementById('i-tipo').value = a.tipo;
  document.getElementById('i-comuna').value = a.comuna;
  document.getElementById('i-notas').value = a.notas || '';
  document.getElementById('modal-title').textContent = 'Editar Acta';
  document.getElementById('modal').classList.add('on');
  checkImperio();
}

async function eliminar(t, idx) {
  const a = filtradas[t][idx];
  if (!confirm(`¿Eliminar acta de ${a.persona}?`)) return;
  try {
    const {error} = await sb.from('actas_italia').delete().eq('id', a.id);
    if (error) throw error;
    await cargar();
  } catch (e) {
    console.error(e);
    alert('Error al eliminar');
  }
}

async function mover(t, idx, nuevo) {
  const a = filtradas[t][idx];
  const txt = nuevo === 'finalizados' ? 'FINALIZADA' : 'EN PROCESO';
  if (!confirm(`¿Marcar como ${txt} la acta de ${a.persona}?`)) return;
  try {
    const {error} = await sb.from('actas_italia').update({estado: nuevo}).eq('id', a.id);
    if (error) throw error;
    await cargar();
  } catch (e) {
    console.error(e);
    alert('Error');
  }
}

function filtrar(t) {
  const q = document.getElementById('search-' + t).value.toLowerCase();
  if (!q) {
    filtradas[t] = [...actas[t]];
  } else {
    filtradas[t] = actas[t].filter(a => {
      const txt = `${a.persona} ${a.avo} ${a.comuna} ${a.tipo} ${a.notas}`.toLowerCase();
      return txt.includes(q);
    });
  }
  pag[t] = 1;
  renderTabla(t);
  if (t === vista) document.getElementById('total-count').textContent = filtradas[t].length;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') cerrarModal();
});

cargar();
</script>
</body>
</html>
