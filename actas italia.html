<style>
:root{--az:#003399;--vd:#009246;--vdl:#e6f7ee;--ro:#CE2B37;--rol:#fdecea;--am:#f59e0b;--aml:#fef9c3;--gr:#64748b;--grl:#f1f5f9;--bg:#f8fafc;--wh:#fff;--bo:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:#1e293b;min-height:100vh}
.hdr{background:var(--wh);border-bottom:1px solid var(--bo);position:sticky;top:0;z-index:100}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 24px;gap:16px}
.hlogo{display:flex;align-items:center;gap:10px}
.logo-banderas{display:flex;gap:4px;height:36px}
.bandera-italia,.bandera-ue{width:24px;height:36px;border-radius:3px}
.bandera-italia{background:linear-gradient(to right,#009246 33%,white 33%,white 67%,#ce2b37 67%)}
.bandera-ue{background:#003399;position:relative}
.estrella-ue{color:#FFCC00;font-size:6px;position:absolute}
.estrella-ue:nth-child(1){top:4px;left:50%;transform:translateX(-50%)}
.estrella-ue:nth-child(2){top:10px;right:4px}
.estrella-ue:nth-child(3){bottom:10px;right:4px}
.estrella-ue:nth-child(4){bottom:4px;left:50%;transform:translateX(-50%)}
.estrella-ue:nth-child(5){bottom:10px;left:4px}
.estrella-ue:nth-child(6){top:10px;left:4px}
.hbrand{font-family:"DM Serif Display",serif;font-size:20px;letter-spacing:1px}
.hsub{font-size:9px;font-weight:500;letter-spacing:2px;color:#bbb;text-transform:uppercase}
.htabs{display:flex;gap:2px;background:var(--grl);padding:3px;border-radius:9px}
.htab{padding:6px 18px;border-radius:7px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--gr);cursor:pointer}
.htab.on{background:var(--wh);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.gchip{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.gdot{width:8px;height:8px;border-radius:50%}
.view{display:none}
.view.on{display:block}
.vbody{max-width:1400px;margin:0 auto;padding:24px}
.toolbar{display:flex;justify-content:space-between;margin-bottom:20px;gap:16px}
.search-box{flex:1;max-width:500px}
.search-box input{width:100%;padding:10px 14px;border:1.5px solid var(--bo);border-radius:9px;font-size:13px;outline:none;transition:all .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.search-box input:focus{border-color:var(--vd);box-shadow:0 2px 8px rgba(0,146,70,.15)}
.btn-add{padding:10px 18px;background:linear-gradient(135deg,var(--vd),#00a854);color:var(--wh);border:none;border-radius:9px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,146,70,.25);transition:all .2s ease;display:flex;align-items:center;gap:4px}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,146,70,.35);background:linear-gradient(135deg,#00a854,var(--vd))}
.btn-add:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,146,70,.2)}
.table-wrap{background:var(--wh);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--bo);overflow:hidden}
.actas-table{width:100%;border-collapse:collapse}
.actas-table thead{background:var(--grl)}
.actas-table th{padding:12px 16px;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bo)}
.actas-table td{padding:12px 16px;border-bottom:1px solid var(--grl);font-size:13px}
.actas-table tbody tr:hover{background:#e8efff}
.tipo-badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
.tipo-nacimiento{background:var(--vdl);color:#065f46}
.tipo-matrimonio{background:#fce7f3;color:#831843}
.tipo-defuncion{background:#fef3c7;color:#78350f}
.tipo-bautismo{background:#dbeafe;color:#1e40af}
.btn-actions{display:flex;gap:6px}
.btn-edit,.btn-del,.btn-finalizar,.btn-proceso{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;font-size:12px;cursor:pointer}
.btn-edit{background:transparent;color:var(--gr)}
.btn-edit:hover{background:#e8efff;border-color:var(--az);color:var(--az)}
.btn-del{background:transparent;color:var(--gr)}
.btn-del:hover{background:var(--rol);border-color:var(--ro);color:var(--ro)}
.btn-finalizar{background:var(--vdl);color:var(--vd);font-weight:600;border-color:var(--vd)}
.btn-proceso{background:var(--aml);color:var(--am);font-weight:600;border-color:var(--am)}
.imperio-badge{display:inline-flex;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef3c7;color:#78350f;border:1.5px solid #fcd34d;margin-left:6px}
.imperio-badge::before{content:"⚠️"}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:20px;padding:16px}
.page-btn{padding:6px 12px;border:1px solid var(--bo);border-radius:6px;background:var(--wh);font-size:12px;cursor:pointer}
.page-btn.active{background:var(--az);color:var(--wh)}
</style>
</head>

function esI(c){if(!c)return false;const n=c.toUpperCase().trim();return C.some(i=>i.toUpperCase().includes(n)||n.includes(i.toUpperCase().split('[')[0].trim()))}
function bI(){return'<span class="imperio-badge">IMPERIO A-H</span>'}

function cambiar(v){
V=v;P[v]=1;
document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
document.querySelectorAll('.htab').forEach(e=>e.classList.remove('on'));
document.getElementById('v-'+v).classList.add('on');
document.querySelector(`[data-tab="${v}"]`).classList.add('on');
render(v);
document.getElementById('cnt').textContent=F[v].length;
}

function render(t){
const tb=document.getElementById('tb-'+t);
const d=F[t];
const p=P[t];
if(d.length===0){
tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:60px;color:#94a3b8">📋<br>No hay actas</td></tr>';
document.getElementById('pg-'+t).innerHTML='';
return;
}
const i=(p-1)*PP;
const f=i+PP;
const pd=d.slice(i,f);
tb.innerHTML=pd.map((a,x)=>{
const ix=i+x;
const tb='tipo-'+a.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
return`<tr>
<td>${fmt(a.fecha)}</td>
<td><strong>${a.persona}</strong></td>
<td>${a.avo||'-'}</td>
<td><span class="tipo-badge ${tb}">${a.tipo}</span></td>
<td style="color:var(--az);font-weight:600">${a.comuna}${esI(a.comuna)?bI():''}</td>
<td style="font-size:12px;color:var(--gr)">${(a.notas||'').substring(0,40)+(a.notas?.length>40?'...':'')}</td>
<td><div class="btn-actions">
${t==='proceso'?`<button class="btn-finalizar" onclick="mover('${t}',${ix},'finalizados')">✓ Finalizar</button>`:''}
${t==='finalizados'?`<button class="btn-proceso" onclick="mover('${t}',${ix},'proceso')">← En Proceso</button>`:''}
<button class="btn-edit" onclick="editar('${t}',${ix})">Editar</button>
<button class="btn-del" onclick="eliminar('${t}',${ix})">Eliminar</button>
</div></td>
</tr>`;
}).join('');
renderPg(t);
}

function renderPg(t){
const tot=Math.ceil(F[t].length/PP);
const dv=document.getElementById('pg-'+t);
if(tot<=1){dv.innerHTML='';return}
const p=P[t];
let h=`<button class="page-btn" onclick="irPg('${t}',${p-1})" ${p===1?'disabled':''}>‹</button>`;
for(let i=1;i<=tot;i++){
if(i===1||i===tot||(i>=p-2&&i<=p+2)){
h+=`<button class="page-btn ${i===p?'active':''}" onclick="irPg('${t}',${i})">${i}</button>`;
}
}
h+=`<button class="page-btn" onclick="irPg('${t}',${p+1})" ${p===tot?'disabled':''}>›</button>`;
dv.innerHTML=h;
}

function irPg(t,p){
const tot=Math.ceil(F[t].length/PP);
if(p<1||p>tot)return;
P[t]=p;
render(t);
}

function fmt(f){
if(!f)return'-';
const d=new Date(f+'T00:00:00');
return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function mover(t,ix,nv){
const a=F[t][ix];
const txt=nv==='finalizados'?'FINALIZADA':'EN PROCESO';
if(!confirm(`¿Marcar como ${txt} la acta de ${a.persona}?`))return;
const ri=D[t].findIndex(x=>x.id===a.id);
if(ri!==-1){
const am=D[t].splice(ri,1)[0];
am.estado=nv;
D[nv].push(am);
localStorage.setItem('actas-zittano',JSON.stringify(D));
F.proceso=[...D.proceso];
F.finalizados=[...D.finalizados];
render('proceso');
render('finalizados');
document.getElementById('cnt').textContent=F[V].length;
}
}

function editar(t,ix){
alert('Función Editar en desarrollo');
}

function eliminar(t,ix){
const a=F[t][ix];
if(!confirm(`¿Eliminar la acta de ${a.persona}?`))return;
const ri=D[t].findIndex(x=>x.id===a.id);
if(ri!==-1){
D[t].splice(ri,1);
localStorage.setItem('actas-zittano',JSON.stringify(D));
F[t]=[...D[t]];
render(t);
document.getElementById('cnt').textContent=F[V].length;
}
}

function filtrar(t){
const q=document.getElementById('s-'+t).value.toLowerCase();
if(!q){
F[t]=[...D[t]];
}else{
F[t]=D[t].filter(a=>{
const tx=`${a.persona} ${a.avo} ${a.comuna} ${a.tipo} ${a.notas}`.toLowerCase();
return tx.includes(q);
});
}
P[t]=1;
render(t);
if(t===V)document.getElementById('cnt').textContent=F[t].length;
}

function nuevaActa(){
const id = Date.now();
const nueva = {
id,
fecha: new Date().toISOString().split('T')[0],
persona: '',
avo: '',
tipo: 'Nacimiento',
comuna: '',
notas: '',
estado: 'proceso'
};
D.proceso.unshift(nueva);
F.proceso=[...D.proceso];
P.proceso=1;
render('proceso');
document.getElementById('cnt').textContent=F.proceso.length;
// Guardar en localStorage
localStorage.setItem('actas-zittano', JSON.stringify(D));
// Hacer focus en el primer input
setTimeout(() => {
const firstInput = document.querySelector(`#row-${id} input`);
if(firstInput) firstInput.focus();
}, 100);
}

const guardado=localStorage.getItem('actas-zittano');
if(guardado){
const g=JSON.parse(guardado);
D.proceso=g.proceso;
D.finalizados=g.finalizados;
F.proceso=[...D.proceso];
F.finalizados=[...D.finalizados];
}

render('proceso');
render('finalizados');
document.getElementById('cnt').textContent=F.proceso.length;
</script>
