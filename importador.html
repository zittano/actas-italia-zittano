function log(mensaje, tipo) {
  const logDiv = document.getElementById("log");
  const timestamp = new Date().toLocaleTimeString("es-AR");
  logDiv.innerHTML += `<div class="${tipo}">[${timestamp}] ${mensaje}</div>`;
  logDiv.scrollTop = logDiv.scrollHeight;
}

async function importarDatos() {
  const btn = document.getElementById("btnImportar");
  const progressDiv = document.getElementById("progress");
  const progressFill = document.getElementById("progressFill");
  
  btn.disabled = true;
  btn.textContent = "Importando...";
  progressDiv.classList.add("show");
  
  log("🚀 Iniciando importación de 436 actas...", "info");
  
  const BATCH_SIZE = 50;
  let importadas = 0;
  let errores = 0;
  
  for (let i = 0; i < ACTAS.length; i += BATCH_SIZE) {
    const batch = ACTAS.slice(i, i + BATCH_SIZE);
    
    try {
      const { data, error } = await supabase
        .from("actas_italia")
        .insert(batch);
      
      if (error) throw error;
      
      importadas += batch.length;
      const porcentaje = Math.round((importadas / ACTAS.length) * 100);
      
      progressFill.style.width = porcentaje + "%";
      progressFill.textContent = porcentaje + "%";
      
      log(`✅ Lote ${Math.floor(i / BATCH_SIZE) + 1}: ${batch.length} actas importadas (${importadas}/436)`, "success");
      
    } catch (error) {
      errores += batch.length;
      log(`❌ Error en lote ${Math.floor(i / BATCH_SIZE) + 1}: ${error.message}`, "error");
    }
    
    await new Promise(resolve => setTimeout(resolve, 100));
  }
  
  log("", "info");
  log("═══════════════════════════════════════", "info");
  log("📊 RESUMEN DE IMPORTACIÓN", "info");
  log("═══════════════════════════════════════", "info");
  log(`✅ Actas importadas: ${importadas}`, "success");
  if (errores > 0) {
    log(`❌ Actas con error: ${errores}`, "error");
  }
  log("", "info");
  
  if (errores === 0) {
    log("🎉 ¡IMPORTACIÓN COMPLETADA CON ÉXITO!", "success");
    log("", "info");
    log("👉 Ahora podés ir a tu sistema:", "info");
    log("https://zittano.github.io/actas-italia-zittano/", "info");
    
    btn.textContent = "✅ Importación Completada";
    btn.style.background = "#059669";
  } else {
    log("⚠️ Importación completada con algunos errores", "warning");
    btn.textContent = "⚠️ Completado con errores";
    btn.style.background = "#f59e0b";
  }
}
